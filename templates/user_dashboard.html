<!DOCTYPE html>
<html>
<head>

<title>User Login</title>

<style>

body{
font-family:Arial;
background:linear-gradient(to right,#1e90ff,#00c6ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
text-align:center;
}

input{
width:250px;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#1e90ff;
border:none;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Enter Phone Number</h2>

<form method="POST">

<input type="text" name="phone" placeholder="Enter Phone Number" required>

<br>

<button type="submit">Check Complaints</button>

</form>

</div>

</body>
</html>
